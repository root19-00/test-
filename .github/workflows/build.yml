name: Build EXE with PyInstaller

on:
  push:
    branches: [ "main", "master" ] # سيعمل التحديث تلقائياً عند رفع أي تعديل على المستودع
  workflow_dispatch: # يتيح لك تشغيل التحويل يدوياً بزر ضغط

jobs:
  build:
    runs-on: windows-latest # تشغيل السيرفر على نظام ويندوز لتوليد ملف exe متوافق

    steps:
    # 1. جلب الكود من مستودعك
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. تثبيت لغة بايثون على سيرفر غيت هاب
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. تثبيت PyInstaller والمكتبات التي يحتاجها كودك
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests pyautogui pywin32

    # 4. تحويل الملف إلى exe مخفي ومستقل
    - name: Build EXE
      run: |
        pyinstaller --noconsole --onefile note.pyw

    # 5. رفع الملف الناتج لتتمكن من تحميله
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MySmartAssistant-EXE
        path: dist/note.exe